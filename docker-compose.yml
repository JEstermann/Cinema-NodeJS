services:
  mysql-db:
    image: mysql:8.0
    container_name: cinema-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cinema-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      PMA_HOST: mysql-db
      PMA_PORT: "3306"

  api:
    build: .
    container_name: cinema-api
    ports:
      - "3000:3000"
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      APP_PORT: "3000"
      DB_HOST: mysql-db
      DB_PORT: "3306"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.massi.dev}
    container_name: cinema-web
    ports:
      - "9080:80"
    depends_on:
      - api

volumes:
  mysql-data:
